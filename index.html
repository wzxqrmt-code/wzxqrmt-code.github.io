<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alireza Apex | Android Developer</title>
    <meta name="description" content="Alireza Apex is an Android Developer from Iran with 23 published applications on Myket.">
    <meta name="theme-color" content="#9d4dff">
    <link rel="canonical" href="https://wzxqrmt-code.github.io/">
    <meta property="og:title" content="Alireza Apex | Android Developer">
    <meta property="og:image" content="https://wzxqrmt-code.github.io/1780913134571.webp">

    <style>
        :root {
            --bg: #07070c; --card: rgba(17,17,30,.75); --border: rgba(255,255,255,.08);
            --text: #ffffff; --muted: #d1d1e0; --accent-text: #e0d0ff;
            --primary: #9d4dff; --primary2: #7a2cff; --surface: rgba(255,255,255,.03);
            --hover-glow: rgba(157,77,255,.4); --input-bg: #10101b;
        }
        body.light-theme {
            --bg: #f5f0ff; --card: rgba(255,255,255,.8); --border: rgba(157,77,255,.2);
            --text: #1a1a2e; --muted: #4a4a6a; --accent-text: #3d0099;
            --primary: #7a2cff;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Vazirmatn',sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; }
        .container { width:min(1100px,92%); margin:auto; }
        .card, .hero-card { background:var(--card); border:1px solid var(--border); border-radius:35px; padding:40px 25px; margin-bottom:30px; }
        .title { font-size:1.6rem; font-weight:800; color:var(--accent-text); margin-bottom:20px; }
        .apps-grid {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px;
        }
        .app-card {
            background:var(--surface); border:1px solid var(--border); border-radius:24px;
            padding:20px; text-align:center; transition:.3s;
        }
        .app-card:hover { transform:translateY(-8px); box-shadow:0 0 30px var(--hover-glow); }
        .app-icon { width:90px; height:90px; border-radius:20px; margin-bottom:15px; }
        .myket-btn {
            background:linear-gradient(135deg,var(--primary),var(--primary2)); color:white;
            padding:12px 28px; border-radius:999px; text-decoration:none; font-weight:700;
        }
        .loading-screen { position:fixed; inset:0; background:#07070c; display:flex; align-items:center; justify-content:center; z-index:9999; }
        .loader { width:60px; height:60px; border:4px solid rgba(157,77,255,.3); border-top-color:#9d4dff; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap">
</head>
<body>
    <div class="loading-screen" id="loadingScreen"><div class="loader"></div></div>

    <div class="container">
        <h1 style="text-align:center; margin:40px 0;">Alireza Apex</h1>

        <div class="hero-card card">
            <h2>Alireza Apex</h2>
            <img src="https://wzxqrmt-code.github.io/1780913134571.webp" alt="Alireza Apex" style="max-width:100%; border-radius:16px; margin:20px 0;">
            <p>۲۳ اپلیکیشن منتشر شده در مایکت</p>
        </div>

        <div class="card">
            <div class="title">اپلیکیشن‌های من</div>
            <div class="apps-grid" id="appsGrid"></div>
        </div>

        <div style="text-align:center; margin:30px 0;">
            <a href="https://myket.ir/developer/dev-99625/apps?lang=fa" target="_blank" class="myket-btn">مشاهده همه ۲۳ اپ در مایکت</a>
        </div>
    </div>

    <script>
        const APPS = [
            {name:"گام‌به‌گام ریاضی پایه نهم", icon:"https://myket.ir/app/ir.tinasoft.riazi_payeh9/icon", url:"https://myket.ir/app/ir.tinasoft.riazi_payeh9"},
            {name:"شبیه‌ساز آسانسور", icon:"https://myket.ir/app/com.sh.theuxs.elevatorsimulator/icon", url:"https://myket.ir/app/com.sh.theuxs.elevatorsimulator"},
            {name:"ترنسلیت پرو", icon:"https://myket.ir/app/com.sh.translatepro/icon", url:"https://myket.ir/app/com.sh.translatepro"},
            {name:"تولید کننده رمز عبور امن", icon:"https://myket.ir/app/com.sh.password.generator/icon", url:"https://myket.ir/app/com.sh.password.generator"},
            {name:"رفیق", icon:"https://myket.ir/app/com.sh.rafigh/icon", url:"https://myket.ir/app/com.sh.rafigh"}
        ];

        function renderApps() {
            document.getElementById('appsGrid').innerHTML = APPS.map(app => `
                <div class="app-card">
                    <img src="${app.icon}" class="app-icon">
                    <h3>${app.name}</h3>
                    <a href="${app.url}" target="_blank" class="myket-btn">مشاهده در مایکت</a>
                </div>
            `).join('');
        }

        // Hide loading
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            renderApps();
        }, 800);
    </script>
</body>
</html>
