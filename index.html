<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alireza Apex | Android Developer</title>

    <meta name="description" content="Android Developer with published apps" />
    <meta name="theme-color" content="#9d4dff" />

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
</div>

<div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="hamburger-btn" onclick="alert('menu')">☰</button>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="lang-btn" onclick="toggleLang()">EN</button>
    </div>

    <!-- HEADER -->
    <header class="hero">
        <div class="hero-card">
            <h1>Alireza Apex</h1>
            <p>Android Developer</p>

            <a class="myket-btn" href="https://myket.ir/developer/dev-99625/apps?lang=fa" target="_blank">
                View Myket Apps
            </a>
        </div>
    </header>

    <!-- ABOUT -->
    <section class="card">
        <h2>About</h2>
        <p>Developer with published Android applications.</p>
    </section>

    <!-- CONTACT -->
    <section class="card">
        <h2>Contact</h2>

        <div class="info-box">
            <p>@WZXQRMT</p>
            <button onclick="copyText('@WZXQRMT')">Copy ID</button>
        </div>

        <div class="info-box">
            <p>developeralireza.sh@gmail.com</p>
            <button onclick="copyText('developeralireza.sh@gmail.com')">Copy Email</button>
        </div>

        <form id="contactForm">
            <input id="nameInput" placeholder="Name" />
            <input id="emailInput" placeholder="Email" />
            <textarea id="messageInput" placeholder="Message"></textarea>

            <button type="submit">Send</button>
        </form>
    </section>

    <!-- INFO -->
    <section class="card">
        <h2>Site Info</h2>
        <p>Status: Online</p>
        <p id="liveClock">00:00:00</p>
    </section>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
